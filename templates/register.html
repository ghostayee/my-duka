{% extends 'base.html' %}
{% block title %} Register part {% endblock %}
{% block content %}
<div class="container my-5">
    <h2 class="text-center text-success">Register</h2>
</div>
<div class="container p-4">
    <form>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label fw-bold">Full Name</label>
            <input type="text" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label fw-bold">Email address</label>
            <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputEmail1" class="form-label fw-bold">Phone Number</label>
            <input type="number" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
        </div>
        <div class="mb-3">
            <label for="exampleInputPassword1" class="form-label fw-bold">Password</label>
            <input type="password" class="form-control" id="exampleInputPassword1">
        </div>
        <div class="text-center">
            <button type="submit" class="btn btn-success fw-bold">Sign Up</button>
        </div>
    </form>
</div>


{% endblock %}
