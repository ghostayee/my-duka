{% extends 'base.html' %}
{% block title %} Dashboard {% endblock %}
{% block content %}
<div>
    <div>
        <p>this is dashboard</p>
    </div>


    <div>
        <div>
            <canvas id="bar-chart-grouped" width="800" height="450"></canvas>
        </div>
        <div>
            <canvas id="line-chart" width="800" height="450"></canvas>
        </div>
    </div>
</div>
<script>
    new Chart(document.getElementById("bar-chart-grouped"), {
        type: 'bar',
        data: {
            labels: {{ product_name | safe }},
            datasets: [
                {
                    label: "Sales",
                    backgroundColor: "#3e95cd",
                    data:{{ sales_product | safe}}
                }, {
                    label: "Profit",
                    backgroundColor: "#8e5ea2",
                    data: {{ sales_product | safe}}
                }
            ]
        },
        options: {
            title: {
                display: true,
                text: 'Sales & Profit per Product (ksh.)'
            }
        }
    });

    //line chart
    new Chart(document.getElementById("line-chart"), {
        type: 'line',
        data: {
            labels: {{ day | safe }},
            datasets: [{
                data: {{ sales_day | safe }},
                label: "Sales",
                borderColor: "#3e95cd",
                fill: false
            }, {
                data: {{ profit_day | safe }},
                label: "Profit",
                borderColor: "#8e5ea2",
                fill: false
            },
            ]
        },
        options: {
            title: {
                display: true,
                text: 'Profit per Day (ksh.)'
            }
        }
    });
</script>

{% endblock %}
