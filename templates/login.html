{% extends 'base.html' %}
{% block title %} login part {% endblock %}
{% block content %}
<div class="cointainer m-4 ">
    <div class="row g-2">
        <div class="col-md-6 p-5 bg-success rounded-5 text-center">
            <h2>welcome</h2>
            <p>Please login to continue.</p>
            <p><span class="bg-light rounded-3 p-2">No Account?</span>click to sign up </p>
            <button type="button" class="btn btn-outline-light text-dark rounded-5 fw-bold mt-4">Sign
                up!</button>
        </div>
        <div class="col-md-6 p-5 bg-secondary rounded-5">
            <h2 class="text-success">login</h2>
            <form action="">
                <label for="exampleInputEmail1" class="form-label">Email address</label>
                <input type="email" placeholder="e.g john544@gmail.com" class="form-control" id="exampleInputEmail1"
                    aria-describedby="emailHelp">
                <label for="exampleInputPassword1" class="form-label">Password</label>
                <input type="password" class="form-control" id="exampleInputPassword1">
                <input type="checkbox" class="form-check-input" id="exampleCheck1">
                <label class="form-check-label" for="exampleCheck1">Check me out</label><br>
                <button type="submit" class="btn btn-success mb-4">Submit</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
